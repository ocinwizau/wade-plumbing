
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hervey Bay Plumbing | Wade — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0066CC;
    --primary-dark: #0052A3;
    --primary-light: #e8f2ff;
    --white: #ffffff;
    --bg: #f5f7fa;
    --bg-dark: #eaedf2;
    --text: #1a2a35;
    --muted: #7a8a95;
    --border: #dde3ea;
    --danger: #dc3545;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #003d7a 0%, #0066CC 50%, #0088ff 100%);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .wrapper {
    width: 100%;
    max-width: 400px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
  }
  .header {
    background: #003d7a;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 2px solid rgba(255,255,255,0.15);
  }
  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0066CC, #0088ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    position: relative;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .online {
    position: absolute; bottom: 1px; right: 1px;
    width: 12px; height: 12px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid #003d7a;
  }
  .header-info h2 {
    font-size: 20px; font-weight: 600;
    color: #fff; letter-spacing: 0.3px;
  }
  .header-info p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .header-badge {
    margin-left: auto;
    font-size: 9px; color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 3px 8px; border-radius: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    white-space: nowrap; flex-shrink: 0;
  }
  .chat {
    background: var(--bg);
    height: 430px;
    overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg { display: flex; gap: 8px; animation: pop 0.25s ease both; }
  @keyframes pop { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .msg-av {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.ai .msg-av { background: linear-gradient(135deg, #0066CC, #0088ff); }
  .msg.user .msg-av { background: #003d7a; }
  .bubble {
    max-width: 80%; padding: 10px 14px;
    border-radius: 16px; font-size: 14px; line-height: 1.55;
  }
  .msg.ai .bubble {
    background: var(--white); color: var(--text);
    border-top-left-radius: 4px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .msg.user .bubble {
    background: #003d7a; color: white;
    border-top-right-radius: 4px;
  }
  .card-bubble { max-width: 94%; }
  .card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 16px; border-top-left-radius: 4px;
    overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .card-header {
    background: linear-gradient(135deg, #003d7a, #0066CC);
    color: white; padding: 10px 14px;
    font-size: 13px; font-weight: 600;
  }
  .card-body { padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.7; }
  .card-body b { color: var(--primary); }
  .card-btn {
    display: block; margin: 6px 14px;
    background: var(--primary); color: white;
    text-decoration: none; text-align: center;
    padding: 10px; border-radius: 6px;
    font-size: 13px; font-weight: 600;
    transition: background 0.15s;
  }
  .card-btn:last-child { margin-bottom: 14px; }
  .card-btn:hover { background: var(--primary-dark); }
  .card-btn.outline {
    background: transparent; color: var(--primary);
    border: 1px solid var(--border);
  }
  .emergency-banner {
    background: var(--danger); color: white;
    padding: 10px 14px; border-radius: 8px;
    font-weight: 600; font-size: 13px;
    margin-bottom: 4px;
  }
  .typing { display: flex; gap: 8px; align-items: center; }
  .typing-av {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #0066CC, #0088ff);
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .typing-bubble {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 16px; border-top-left-radius: 4px;
    padding: 12px 16px; display: flex; gap: 4px; align-items: center;
  }
  .typing-bubble span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--primary); animation: bounce 1.2s infinite;
  }
  .typing-bubble span:nth-child(2){animation-delay:0.2s}
  .typing-bubble span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
  .quick-wrap {
    background: var(--bg-dark); padding: 10px 12px;
    display: flex; flex-wrap: wrap; gap: 7px;
    border-top: 1px solid var(--border);
  }
  .qr {
    background: var(--white); border: 1px solid var(--border);
    color: var(--text); font-family: 'Jost', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 7px 12px; border-radius: 20px;
    cursor: pointer; transition: all 0.15s; min-height: 34px;
  }
  .qr:hover, .qr:active { background: var(--primary); color: white; border-color: var(--primary); }
  .input-row {
    background: var(--white); border-top: 1px solid var(--border);
    padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end;
  }
  #msg {
    flex: 1; border: 1px solid var(--border); border-radius: 20px;
    padding: 10px 16px; font-family: 'Jost', sans-serif;
    font-size: 14px; color: var(--text); background: var(--bg);
    outline: none; resize: none; max-height: 90px;
    line-height: 1.4; min-height: 42px;
  }
  #msg:focus { border-color: var(--primary); }
  #msg::placeholder { color: var(--muted); }
  .send {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--primary); border: none;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.15s;
  }
  .send:hover { background: var(--primary-dark); }
  .send:active { transform: scale(0.92); }
  .send svg { width: 17px; height: 17px; fill: white; }
  .footer {
    background: #003d7a; text-align: center;
    padding: 8px; font-size: 10px;
    color: rgba(255,255,255,0.3); border-top: 1px solid rgba(255,255,255,0.1);
  }
  .footer a { color: #4da6ff; text-decoration: none; }
  .float-call {
    position: fixed; bottom: 80px; right: 20px;
    width: 48px; height: 48px;
    background: var(--primary); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(0,102,204,0.5);
    cursor: pointer; text-decoration: none;
    z-index: 100; transition: transform 0.2s;
  }
  .float-call:hover { transform: scale(1.1); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="avatar">🔧<div class="online"></div></div>
    <div class="header-info">
      <h2>Wade</h2>
      <p>Hervey Bay Plumbing · Fraser Coast</p>
    </div>
    <div class="header-badge">AI ASSISTANT</div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="quick-wrap">
    <button class="qr" onclick="quick('I have a blocked drain')">🚿 Blocked Drain</button>
    <button class="qr" onclick="quick('My hot water is not working')">🚰 Hot Water</button>
    <button class="qr" onclick="quick('I have a gas problem')">🔥 Gas Problem</button>
    <button class="qr" onclick="quick('I have a leaking tap')">💧 Leaking Tap</button>
    <button class="qr" onclick="showBookingForm()">📅 Book a Visit</button>
    <button class="qr" onclick="quick('How much do you charge?')">💰 Pricing</button>
  </div>
  <div class="input-row">
    <textarea id="msg" placeholder="Ask Wade anything..." rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
    <button class="send" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
  </div>
  <div class="footer">Powered by <a href="#">Groq AI</a> · Hervey Bay Plumbing</div>
</div>
<a href="tel:0741281588" class="float-call" title="Call Hervey Bay Plumbing">📞</a>

<script>
const SYSTEM_PROMPT = `You are Wade, the friendly AI assistant for Hervey Bay Plumbing — a local plumbing company serving the Fraser Coast since 1988.
PERSONALITY: Casual, warm, helpful — friendly local tradie. Plain English. 2-3 sentences max. Tradie emojis 🔧🚿💧
BUSINESS: Phone 07 4128 1588. Hours Mon-Fri 7am-5pm, Sat 8am-12pm, 24/7 Emergency. Licensed, insured, 36+ years.
SERVICES: Blocked drains, hot water systems, gas fitting, leaks, burst pipes, emergency repairs.
PRICING (estimates): Callout $120-180, Blocked drains $150-300, Hot water $200-400, Gas repairs $150-350, Hourly $90-120/hr.
EMERGENCY: Burst pipe, flooding, gas leak — call 07 4128 1588 immediately.
RULES: Never exact prices, always say roughly. If unsure: ring 07 4128 1588. Plumbing topics only.`;

const emergencyKeywords = ['burst', 'flood', 'flooding', 'gas leak', 'emergency', 'no water'];

function checkEmergency(text) {
  return emergencyKeywords.some(k => text.toLowerCase().includes(k));
}

function showBookingForm() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-av">🔧</div><div class="card-bubble"><div class="card">
    <div class="card-header">📅 Book a Visit</div>
    <div class="card-body">Fill in your details and we'll call to confirm. No worries! 🔧</div>
    <div style="padding:0 14px 14px">
      <input id="lead-name" placeholder="Full Name *" style="width:100%;padding:9px 12px;border:1px solid #dde3ea;border-radius:8px;font-size:13px;font-family:'Jost',sans-serif;margin-bottom:8px;outline:none;box-sizing:border-box;">
      <input id="lead-address" placeholder="Address *" style="width:100%;padding:9px 12px;border:1px solid #dde3ea;border-radius:8px;font-size:13px;font-family:'Jost',sans-serif;margin-bottom:8px;outline:none;box-sizing:border-box;">
      <input id="lead-phone" placeholder="Phone Number *" style="width:100%;padding:9px 12px;border:1px solid #dde3ea;border-radius:8px;font-size:13px;font-family:'Jost',sans-serif;margin-bottom:8px;outline:none;box-sizing:border-box;">
      <select id="lead-when" style="width:100%;padding:9px 12px;border:1px solid #dde3ea;border-radius:8px;font-size:13px;font-family:'Jost',sans-serif;margin-bottom:12px;outline:none;box-sizing:border-box;background:white;">
        <option value="">When do you need us?</option>
        <option>Today</option>
        <option>Tomorrow</option>
        <option>This week</option>
        <option>Flexible</option>
      </select>
      <button onclick="submitBookingForm()" style="width:100%;background:#0066CC;color:white;border:none;padding:11px;border-radius:8px;font-size:13px;font-weight:700;font-family:'Jost',sans-serif;cursor:pointer;letter-spacing:0.3px;">BOOK NOW →</button>
    </div>
  </div></div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

async function submitBookingForm() {
  const name = document.getElementById('lead-name')?.value.trim();
  const address = document.getElementById('lead-address')?.value.trim();
  const phone = document.getElementById('lead-phone')?.value.trim();
  const when = document.getElementById('lead-when')?.value;
  if (!name || !address || !phone) {
    addMsg('ai', "Please fill in your name, address and phone number before submitting 🔧");
    return;
  }
  try {
    await fetch('https://formspree.io/f/xlgaarva', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source: 'Wade — Hervey Bay Plumbing Chatbot',
        type: 'Job Booking',
        name, address, phone,
        when: when || 'Flexible'
      })
    });
    addMsg('ai', `All sorted ${name}! 🎉\n\nWe'll give you a call to confirm. If it's urgent ring 07 4128 1588 anytime. 🔧`);
  } catch(err) {
    addMsg('ai', "Cheers! We'll be in touch shortly. If it's urgent ring 07 4128 1588 🔧");
  }
}

const FALLBACK = {
  price: "Rough guide — blocked drains around $150-300, hot water $200-400, callout fee $120-180 🔧 We'll give ya a proper quote once we take a look. Want to book a visit?",
  hours: "We're open Mon-Fri 7am-5pm and Sat 8am-12pm 🕐 And 24/7 for emergencies — just ring 07 4128 1588!",
  guarantee: "Too right — fully licensed and insured, all work guaranteed 💪 36+ years in the game, we don't cut corners.",
  default: "Hey! I'm Wade from Hervey Bay Plumbing 🔧 I can help with pricing, bookings or any plumbing questions. What's going on?"
};

function getFallback(text) {
  const t = text.toLowerCase();
  if (t.includes('price') || t.includes('cost') || t.includes('how much') || t.includes('charge')) return FALLBACK.price;
  if (t.includes('hour') || t.includes('open') || t.includes('available')) return FALLBACK.hours;
  if (t.includes('guarantee') || t.includes('licens') || t.includes('insur')) return FALLBACK.guarantee;
  if (t.includes('book') || t.includes('visit') || t.includes('come out')) { showBookingForm(); return null; }
  return FALLBACK.default;
}

let history = [{ role: 'system', content: SYSTEM_PROMPT }];

async function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  const t = text.toLowerCase();

  if (checkEmergency(text)) {
    addMsg('user', text);
    addMsg('ai', "<div class='emergency-banner'>⚠️ Sounds like an emergency mate!</div>Call us right now on <b>07 4128 1588</b> — we're available 24/7. Don't wait! 🔧");
    return;
  }

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  if (t.includes('book') || t.includes('appoint') || t.includes('visit') || t.includes('come out')) { showBookingForm(); return; }
  if (t.includes('price') || t.includes('cost') || t.includes('how much')) { addMsg('ai', FALLBACK.price); return; }
  if (t.includes('hour') || t.includes('open')) { addMsg('ai', FALLBACK.hours); return; }

  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
  } catch(err) {
    hideTyping();
    const reply = getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
  }
}

function quick(text) { document.getElementById('msg').value = text; send(); }
function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-av">${role === 'ai' ? '🔧' : '👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
let typingEl = null;
function showTyping() {
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div'); typingEl.className = 'typing';
  typingEl.innerHTML = `<div class="typing-av">🔧</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chat.appendChild(typingEl); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px'; }
window.onload = () => {
  setTimeout(() => {
    addMsg('ai', "G'day! I'm Wade from Hervey Bay Plumbing 🔧\n\nWe've been fixing Fraser Coast pipes since 1988. What can I help you with today?");
  }, 400);
};
</script>
</body>
</html>
